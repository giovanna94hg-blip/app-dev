apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops

  template:
    metadata:
      labels:
        app: devops

    spec:
      containers:
        - name: devops
          image: giovanna94hdez/app-dev:latest
          ports:
            - containerPort: 3000
